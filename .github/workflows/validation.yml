name: Repository Validation

"on":
  push:
  pull_request:

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: v1.7.12
  CODESPELL_VERSION: 2.4.2
  EDITORCONFIG_CHECKER_VERSION: v3.7.0
  GO_VERSION: "1.25.1"
  MARKDOWNLINT_CLI2_VERSION: 0.22.1
  NODE_VERSION: 22.12.0
  PSSCRIPTANALYZER_VERSION: 1.25.0
  PYTHON_VERSION: 3.13.1
  SHELLCHECK_VERSION: 0.11.0
  SHELLCHECK_LINUX_X64_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
  SHELLCHECK_WINDOWS_X64_SHA256: 8a4e35ab0b331c85d73567b12f2a444df187f483e5079ceffa6bda1faa2e740e
  SHFMT_VERSION: v3.13.1
  YAMLLINT_VERSION: 1.38.0

jobs:
  validate:
    name: Validate repository
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install validation tools
        shell: pwsh
        run: |
          npm install --global "markdownlint-cli2@$env:MARKDOWNLINT_CLI2_VERSION"
          python -m pip install `
            "yamllint==$env:YAMLLINT_VERSION" `
            "codespell==$env:CODESPELL_VERSION"
          $shellCheckBase = "https://github.com/koalaman/shellcheck/releases/download"
          $shellCheckArchive = "shellcheck-v$env:SHELLCHECK_VERSION.zip"
          $shellCheckWorkdir = Join-Path $env:RUNNER_TEMP "shellcheck-$env:SHELLCHECK_VERSION"
          $shellCheckPath = Join-Path $shellCheckWorkdir $shellCheckArchive
          New-Item -ItemType Directory -Force -Path $shellCheckWorkdir | Out-Null
          curl.exe --fail --location --show-error --output $shellCheckPath `
            "$shellCheckBase/v$env:SHELLCHECK_VERSION/$shellCheckArchive"
          $shellCheckHash = Get-FileHash -LiteralPath $shellCheckPath -Algorithm SHA256
          if ($shellCheckHash.Hash.ToLowerInvariant() -ne $env:SHELLCHECK_WINDOWS_X64_SHA256) {
            throw "ShellCheck archive checksum mismatch."
          }
          Expand-Archive -LiteralPath $shellCheckPath -DestinationPath $shellCheckWorkdir -Force
          $shellCheckExe = Join-Path $shellCheckWorkdir "shellcheck.exe"
          if (-not (Test-Path -LiteralPath $shellCheckExe)) {
            throw "Unable to locate ShellCheck after archive extraction."
          }
          Add-Content -Path $env:GITHUB_PATH -Value $shellCheckWorkdir
          $goBin = Join-Path (go env GOPATH) "bin"
          Add-Content -Path $env:GITHUB_PATH -Value $goBin
          go install "mvdan.cc/sh/v3/cmd/shfmt@$env:SHFMT_VERSION"
          go install "github.com/rhysd/actionlint/cmd/actionlint@$env:ACTIONLINT_VERSION"
          $editorConfigChecker = "github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker"
          go install "$editorConfigChecker@$env:EDITORCONFIG_CHECKER_VERSION"
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module `
            -Name PSScriptAnalyzer `
            -RequiredVersion $env:PSSCRIPTANALYZER_VERSION `
            -Scope CurrentUser `
            -Force `
            -AllowClobber `
            -Repository PSGallery

      - name: Run Markdown lint
        shell: pwsh
        run: markdownlint-cli2 "**/*.md"

      - name: Run YAML lint
        shell: pwsh
        run: >-
          yamllint .yamllint .markdownlint-cli2.yaml config/tools.yaml
          .github/workflows/validation.yml .github/dependabot.yml

      - name: Run actionlint
        shell: pwsh
        run: actionlint .github/workflows/validation.yml

      - name: Run EditorConfig check
        shell: pwsh
        run: editorconfig-checker .

      - name: Check Bash syntax
        shell: pwsh
        run: bash -n scripts/install-tools.sh

      - name: Run shfmt
        shell: pwsh
        run: shfmt -d -i 2 scripts/install-tools.sh

      - name: Run ShellCheck
        shell: pwsh
        run: shellcheck scripts/install-tools.sh

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $scriptPaths = @(
            "./scripts/install-tools.ps1",
            "./tests/test-plan.ps1",
            "./tests/generate-combination-inventory.ps1"
          )
          foreach ($scriptPath in $scriptPaths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $scriptPath),
              [ref] $tokens,
              [ref] $errors
            ) > $null
            if ($errors) {
              $errors
              exit 1
            }
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $findings = @(
            Invoke-ScriptAnalyzer -Path ./scripts/install-tools.ps1
            Invoke-ScriptAnalyzer -Path ./tests/test-plan.ps1
            Invoke-ScriptAnalyzer -Path ./tests/generate-combination-inventory.ps1
          )
          if ($findings.Count -gt 0) {
            $findings | Format-Table -AutoSize
            exit 1
          }

      - name: Check JavaScript config syntax
        shell: pwsh
        run: node --check commitlint.config.cjs

      - name: Run codespell
        shell: pwsh
        run: codespell .

      - name: Run offline test plan
        shell: pwsh
        run: ./tests/test-plan.ps1

  validate-linux:
    name: Validate repository (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install validation tools
        shell: bash
        run: |
          npm install --global "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}"
          python -m pip install \
            "yamllint==${YAMLLINT_VERSION}" \
            "codespell==${CODESPELL_VERSION}"
          shellcheck_base="https://github.com/koalaman/shellcheck/releases/download"
          shellcheck_archive="shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          shellcheck_workdir="${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}"
          shellcheck_path="${shellcheck_workdir}/${shellcheck_archive}"
          shellcheck_bin="${shellcheck_workdir}/shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          mkdir -p "${shellcheck_workdir}"
          curl --fail --location --show-error --output "${shellcheck_path}" \
            "${shellcheck_base}/v${SHELLCHECK_VERSION}/${shellcheck_archive}"
          printf '%s  %s\n' "${SHELLCHECK_LINUX_X64_SHA256}" "${shellcheck_path}" | sha256sum --check --strict
          tar -xJf "${shellcheck_path}" -C "${shellcheck_workdir}"
          sudo install -m 0755 "${shellcheck_bin}" /usr/local/bin/shellcheck
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
          go install "mvdan.cc/sh/v3/cmd/shfmt@${SHFMT_VERSION}"
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          editorconfig_checker="github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker"
          go install "${editorconfig_checker}@${EDITORCONFIG_CHECKER_VERSION}"

      - name: Run Markdown lint
        shell: bash
        run: markdownlint-cli2 "**/*.md"

      - name: Run YAML lint
        shell: bash
        run: >-
          yamllint .yamllint .markdownlint-cli2.yaml config/tools.yaml
          .github/workflows/validation.yml .github/dependabot.yml

      - name: Run actionlint
        shell: bash
        run: actionlint .github/workflows/validation.yml

      - name: Run EditorConfig check
        shell: bash
        run: editorconfig-checker .

      - name: Check Bash syntax
        shell: bash
        run: bash -n scripts/install-tools.sh

      - name: Run shfmt
        shell: bash
        run: shfmt -d -i 2 scripts/install-tools.sh

      - name: Run ShellCheck
        shell: bash
        run: shellcheck scripts/install-tools.sh

      - name: Check JavaScript config syntax
        shell: bash
        run: node --check commitlint.config.cjs

      - name: Run codespell
        shell: bash
        run: codespell .
