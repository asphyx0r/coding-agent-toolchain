schema_version: 1
tools:
  - id: yamllint
    executable: yamllint
    version_args:
      - --version
    installers:
      windows:
        kind: pip
        package: yamllint
      linux:
        kind: pip
        package: yamllint

  - id: yq
    executable: yq
    version_args:
      - --version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe'
        file_name: yq.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64'
        file_name: yq

  - id: jq
    executable: jq
    version_args:
      - --version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/jqlang/jq/releases/latest/download/jq-windows-amd64.exe'
        file_name: jq.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/jqlang/jq/releases/latest/download/jq-linux-amd64'
        file_name: jq

  - id: shfmt
    executable: shfmt
    version_args:
      - -version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/patrickvane/shfmt/releases/download/master/shfmt_windows_amd64.exe'
        file_name: shfmt.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/patrickvane/shfmt/releases/download/master/shfmt_linux_amd64'
        file_name: shfmt

  - id: markdownlint-cli2
    executable: markdownlint-cli2
    version_args:
      - --version
    installers:
      windows:
        kind: npm_global
        package: markdownlint-cli2
      linux:
        kind: npm_global
        package: markdownlint-cli2

  - id: commitlint
    executable: commitlint
    version_args:
      - --version
    installers:
      windows:
        kind: npm_global
        package: '@commitlint/cli'
      linux:
        kind: npm_global
        package: '@commitlint/cli'

  - id: imagemagick
    executable: magick
    version_args:
      - -version
    installers:
      windows:
        kind: portable_archive
        owner: ImageMagick
        repo: ImageMagick
        asset_pattern: 'ImageMagick-[0-9.]+-[0-9]+-portable-Q16-x64[.]7z'
        executable: magick.exe
        install_dir_name: imagemagick
        bin_path: .
        archive_kind: seven_zip
      linux:
        kind: appimage_extract
        owner: ImageMagick
        repo: ImageMagick
        asset_pattern: 'ImageMagick-.*-gcc-x86_64[.]AppImage'
        file_name: magick

  - id: ghostscript
    executable: gs
    version_args:
      - --version
    installers:
      windows:
        kind: direct_installer
        owner: ArtifexSoftware
        repo: ghostpdl-downloads
        asset_pattern: 'gs[0-9]+w64[.]exe'
        executable: gswin64c
        install_args: /S
        target_arg_prefix: /D=
        install_dir_name: ghostscript
        bin_path: bin
      linux:
        kind: source_make
        owner: ArtifexSoftware
        repo: ghostpdl-downloads
        asset_pattern: 'ghostscript-[0-9.]+[.]tar[.]xz'
        source_dir: 'ghostscript-*'
        package: ghostscript
        install_dir_name: ghostscript
        bin_path: bin

  - id: shellcheck
    executable: shellcheck
    version_args:
      - --version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.zip'
        file_name: shellcheck.exe
        archive_kind: zip
        archive_path: shellcheck.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz'
        file_name: shellcheck
        archive_kind: tar_xz
        archive_path: shellcheck-stable/shellcheck

  - id: sqlfluff
    executable: sqlfluff
    version_args:
      - --version
    installers:
      windows:
        kind: pip
        package: sqlfluff
      linux:
        kind: pip
        package: sqlfluff

  - id: pre-commit
    executable: pre-commit
    version_args:
      - --version
    installers:
      windows:
        kind: pip
        package: pre-commit
      linux:
        kind: pip
        package: pre-commit

  - id: gitleaks
    executable: gitleaks
    version_args:
      - version
    installers:
      windows:
        kind: github_release_asset
        owner: gitleaks
        repo: gitleaks
        asset_pattern: 'gitleaks_[0-9.]+_windows_x64[.]zip'
        file_name: gitleaks.exe
        archive_kind: zip
      linux:
        kind: github_release_asset
        owner: gitleaks
        repo: gitleaks
        asset_pattern: 'gitleaks_[0-9.]+_linux_x64[.]tar[.]gz'
        file_name: gitleaks
        archive_kind: tar_gz

  - id: betterleaks
    executable: betterleaks
    version_args:
      - --version
    installers:
      windows:
        kind: github_release_asset
        owner: betterleaks
        repo: betterleaks
        asset_pattern: 'betterleaks_[0-9.]+_windows_x64[.]zip'
        file_name: betterleaks.exe
        archive_kind: zip
      linux:
        kind: github_release_asset
        owner: betterleaks
        repo: betterleaks
        asset_pattern: 'betterleaks_[0-9.]+_linux_x64[.]tar[.]gz'
        file_name: betterleaks
        archive_kind: tar_gz

  - id: github-cli
    executable: gh
    version_args:
      - --version
    installers:
      windows:
        kind: github_release_asset
        owner: cli
        repo: cli
        asset_pattern: 'gh_[0-9.]+_windows_amd64[.]zip'
        file_name: gh.exe
        archive_kind: zip
      linux:
        kind: github_release_asset
        owner: cli
        repo: cli
        asset_pattern: 'gh_[0-9.]+_linux_amd64[.]tar[.]gz'
        file_name: gh
        archive_kind: tar_gz

  - id: ruff
    executable: ruff
    version_args:
      - --version
    installers:
      windows:
        kind: pip
        package: ruff
      linux:
        kind: pip
        package: ruff

  - id: editorconfig-checker
    executable: editorconfig-checker
    version_args:
      - --version
    installers:
      windows:
        kind: github_release_asset
        owner: editorconfig-checker
        repo: editorconfig-checker
        asset_pattern: 'ec-windows-amd64[.]zip'
        file_name: editorconfig-checker.exe
        archive_kind: zip
        archive_path: bin/ec-windows-amd64.exe
      linux:
        kind: github_release_asset
        owner: editorconfig-checker
        repo: editorconfig-checker
        asset_pattern: 'ec-linux-amd64[.]tar[.]gz'
        file_name: editorconfig-checker
        archive_kind: tar_gz
        archive_path: bin/ec-linux-amd64

  - id: psscriptanalyzer
    executable: Invoke-ScriptAnalyzer
    installers:
      windows:
        kind: powershell_gallery
        package: PSScriptAnalyzer
      linux:
        kind: powershell_gallery
        package: PSScriptAnalyzer

  - id: bats-core
    executable: bats
    version_args:
      - --version
    installers:
      linux:
        kind: npm_global
        package: bats

  - id: pester
    executable: Invoke-Pester
    installers:
      windows:
        kind: powershell_gallery
        package: Pester
      linux:
        kind: powershell_gallery
        package: Pester
