schema_version: 2
tools:
  - id: yamllint
    executable: yamllint
    version_args:
      - --version
    installers:
      windows:
        kind: pip
        package: yamllint
      linux:
        kind: pip
        package: yamllint

  - id: yq
    executable: yq
    version_args:
      - --version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_windows_amd64.exe'
        sha256: e279bc506a452eeafcdf364f91a025455e402a8001169083caf01f4b64a544e2
        file_name: yq.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64'
        sha256: fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4
        file_name: yq

  - id: jq
    executable: jq
    version_args:
      - --version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/jqlang/jq/releases/download/jq-1.8.2/jq-windows-amd64.exe'
        sha256: a6fc67fedaf9128a3309a1e2ebb8b986aeccf70122ee46d2cb4849e423f0c627
        file_name: jq.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/jqlang/jq/releases/download/jq-1.8.2/jq-linux-amd64'
        sha256: b1c22172dd303f3be49e935aa56aa48a8b7a46e0bc838b4997d3bb451495870f
        file_name: jq

  - id: shfmt
    executable: shfmt
    version_args:
      - -version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_windows_amd64.exe'
        sha256: 60cd368533d0ad73fa86d93d5bbf95ef40587245ce684ed138c1b31557b5fe97
        file_name: shfmt.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64'
        sha256: fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1
        file_name: shfmt

  - id: markdownlint-cli2
    executable: markdownlint-cli2
    version_args:
      - --version
    installers:
      windows:
        kind: npm_global
        package: markdownlint-cli2
      linux:
        kind: npm_global
        package: markdownlint-cli2

  - id: commitlint
    executable: commitlint
    version_args:
      - --version
    installers:
      windows:
        kind: npm_global
        package: '@commitlint/cli'
      linux:
        kind: npm_global
        package: '@commitlint/cli'

  - id: imagemagick
    executable: magick
    version_args:
      - -version
    installers:
      windows:
        kind: portable_archive
        release_tag: 7.1.2-26
        sha256: 3f78bac9a941f6c18f332f575145f52d744e19fa781e5ab7d2fd6c0890f0bb18
        owner: ImageMagick
        repo: ImageMagick
        asset_pattern: 'ImageMagick-[0-9.]+-[0-9]+-portable-Q16-x64[.]7z'
        executable: magick.exe
        install_dir_name: imagemagick
        bin_path: .
        archive_kind: seven_zip
      linux:
        kind: appimage_extract
        release_tag: 7.1.2-26
        sha256: 6366d353b81871929a653ad81158e805f3611d1be7836f2490b6afc38b64c92f
        owner: ImageMagick
        repo: ImageMagick
        asset_pattern: 'ImageMagick-.*-gcc-x86_64[.]AppImage'
        file_name: magick

  - id: ghostscript
    executable: gs
    version_args:
      - --version
    installers:
      windows:
        kind: direct_installer
        release_tag: gs10071
        sha256: 3a4c28d0aac47aa7cccd35a5932c55110376e9dbd966898dde388b7faba444a4
        owner: ArtifexSoftware
        repo: ghostpdl-downloads
        asset_pattern: 'gs[0-9]+w64[.]exe'
        executable: gswin64c
        install_args: /S
        target_arg_prefix: /D=
        install_dir_name: ghostscript
        bin_path: bin
      linux:
        kind: source_make
        release_tag: gs10071
        sha256: 1cdb766de8db8f1e589c817f09c5855ea5f65dfc8540e465a69ac14c18416025
        owner: ArtifexSoftware
        repo: ghostpdl-downloads
        asset_pattern: 'ghostscript-[0-9.]+[.]tar[.]xz'
        source_dir: 'ghostscript-*'
        package: ghostscript
        install_dir_name: ghostscript
        bin_path: bin

  - id: shellcheck
    executable: shellcheck
    version_args:
      - --version
    installers:
      windows:
        kind: direct_binary
        url: 'https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.zip'
        sha256: 8a4e35ab0b331c85d73567b12f2a444df187f483e5079ceffa6bda1faa2e740e
        file_name: shellcheck.exe
        archive_kind: zip
        archive_path: shellcheck.exe
      linux:
        kind: direct_binary
        url: 'https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz'
        sha256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
        file_name: shellcheck
        archive_kind: tar_xz
        archive_path: shellcheck-v0.11.0/shellcheck

  - id: sqlfluff
    executable: sqlfluff
    version_args:
      - --version
    installers:
      windows:
        kind: pip
        package: sqlfluff
      linux:
        kind: pip
        package: sqlfluff

